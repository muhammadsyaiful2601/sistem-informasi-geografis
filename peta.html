<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Psdku Tanah Datar</title>
    <link rel="stylesheet" href="dist/leaflet.css"/>
    <script src="dist/leaflet.js"></script>
    <style>
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
</body>
<script>
    var map = L.map('map').setView([-0.5056163595485136, 100.77879259482418], 17);
    L.tileLayer('https://api.maptiler.com/maps/streets-v2/{z}/{x}/{y}.png?key=VMd1gieKnl5V7Z3FAPeW', {
        tileSize: 512,
        zoomOffset: -1,
        minZoom: 1,
        attribution: '<a href="https://www.maptiler.com/copyright/" target="_blank">&copy; MapTiler</a> <a href="https://www.openstreetmap.org/copyright" target="_blank">&copy; OpenStreetMap contributors</a>'
    }).addTo(map);
    var marker = L.marker([-0.5056163595485136, 100.77879259482418]).addTo(map);
</script>
</html>
