<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peta Psdku Tanah Datar</title>
    <link rel="stylesheet" href="dist/leaflet.css" />
    <script src="dist/leaflet.js"></script>
    <style>
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
  </body>
  <script>
    var map = L.map("map").setView(
      [-0.47225555767092053, 100.7615299123425],
      17,
    );
    L.tileLayer(
      "https://api.maptiler.com/maps/hybrid-v4/{z}/{x}/{y}.jpg?key=VMd1gieKnl5V7Z3FAPeW",
      {
        tileSize: 512,
        zoomOffset: -1,
        minZoom: 1,
        attribution:
          '<a href="https://www.maptiler.com/copyright/" target="_blank">&copy; MapTiler</a> <a href="https://www.openstreetmap.org/copyright" target="_blank">&copy; OpenStreetMap contributors</a>',
      },
    ).addTo(map);
    var marker = L.marker([-0.47225555767092053, 100.7615299123425]).addTo(map);
  </script>
</html>
